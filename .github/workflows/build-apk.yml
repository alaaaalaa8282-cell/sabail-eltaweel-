name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew :app:assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Sabail-App
        path: app/build/outputs/apk/release/*.apk
