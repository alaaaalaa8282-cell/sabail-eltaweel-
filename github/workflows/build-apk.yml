name: Build & Release APK - سبيل الطويل

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 3.27.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner (Drift code gen)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate splash screen
        run: dart run flutter_native_splash:create

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: سبيل-الطويل-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "سبيل الطويل - ${{ github.ref_name }}"
          body: |
            ## 📱 تطبيق سبيل الطويل الإسلامي
            ### تحديث ${{ github.ref_name }}
            
            **قم بتنزيل APK المناسب لجهازك:**
            - `arm64-v8a` → معظم الهواتف الحديثة ✅
            - `armeabi-v7a` → الهواتف القديمة
            - `x86_64` → المحاكي
          files: build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
